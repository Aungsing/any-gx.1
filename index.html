<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANY GALAXY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030208;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .scroll-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 2rem;
        }
        .interactive {
            pointer-events: auto;
        }
        h1.main-title {
            font-size: 8vw;
            font-weight: 200;
            letter-spacing: 1.5rem;
            text-transform: uppercase;
            text-align: center;
            background: linear-gradient(to bottom, #ffffff, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(99, 102, 241, 0.2);
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(50px);
            font-family: 'Courier New', Courier, monospace;
        }
        .subtitle {
            font-size: 1rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            color: #a5b4fc;
            opacity: 0;
            transform: translateY(30px);
            text-align: center;
            max-width: 600px;
            line-height: 1.8;
        }
        .hint {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            letter-spacing: 0.3rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            animation: pulse 2s infinite ease-in-out;
            opacity: 0;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        .overlay-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 3rem;
            box-sizing: border-box;
        }
        .ui-element {
            font-size: 0.75rem;
            letter-spacing: 0.2rem;
            color: rgba(165, 180, 252, 0.4);
            text-transform: uppercase;
            font-family: monospace;
        }
        .back-btn {
            position: fixed;
            top: 3rem;
            right: 3rem;
            z-index: 200;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            letter-spacing: 0.2rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        .back-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
        .cinematic-bar {
            position: fixed;
            left: 0;
            width: 100%;
            height: 0vh;
            background: #000;
            z-index: 99;
            transition: height 1s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .cinematic-top { top: 0; }
        .cinematic-bottom { bottom: 0; }
        body.cinematic-mode .cinematic-bar { height: 8vh; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div class="cinematic-bar cinematic-top"></div>
    <div class="cinematic-bar cinematic-bottom"></div>

    <div id="canvas-container"></div>

    <button class="back-btn" id="backBtn">Return to Source</button>

    <div class="overlay-ui">
        <div class="ui-element">SYS // ANY_GALAXY_INIT</div>
        <div class="ui-element">CORTEX // ACTIVE</div>
    </div>

    <div class="scroll-container" id="scrollContainer">
        <div class="section interactive">
            <h1 class="main-title" id="mainTitle">ANY GALAXY</h1>
            <p class="subtitle" id="mainSub">A floating fragments of memory encapsulated in cosmic verse</p>
            <div class="hint" id="mainHint">Click the core to descend</div>
        </div>
    </div>

    <script>
        const vertexShaderBackground = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShaderBackground = `
            uniform float uTime;
            uniform vec2 uResolution;
            varying vec2 vUv;

            vec3 palette( in float t, in vec3 a, in vec3 b, in vec3 c, in vec3 d ) {
                return a + b*cos( 6.28318*(c*t+d) );
            }

            float noise(vec2 p) {
                return sin(p.x * 10.0 + sin(p.y * 10.0 + uTime)) * cos(p.y * 10.0 + uTime);
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy * 2.0 - uResolution.xy) / min(uResolution.x, uResolution.y);
                vec2 uv0 = uv;
                vec3 finalColor = vec3(0.0);
                
                uv *= 0.5;
                float d = length(uv);
                
                for(float i = 0.0; i < 3.0; i++) {
                    uv = fract(uv * 1.5) - 0.5;
                    d = length(uv) * exp(-length(uv0));
                    vec3 col = palette(length(uv0) + i*0.4 + uTime*0.2, vec3(0.5,0.5,0.5), vec3(0.5,0.5,0.5), vec3(1.0,1.0,1.0), vec3(0.0,0.33,0.67));
                    d = sin(d*8.0 + uTime)/8.0;
                    d = abs(d);
                    d = pow(0.015 / d, 1.2);
                    finalColor += col * d;
                }
                
                gl_FragColor = vec4(finalColor * 0.4, 1.0);
            }
        `;

        const vertexShaderFace = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;
            uniform float uTime;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vec3 pos = position;
                pos.z += sin(pos.x * 5.0 + uTime) * 0.05;
                pos.y += cos(pos.z * 5.0 + uTime) * 0.05;
                vPosition = pos;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const fragmentShaderFace = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;
            uniform vec3 uColor;
            uniform float uTime;
            void main() {
                float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 2.0);
                vec3 glow = vec3(0.6, 0.7, 1.0) * intensity * 2.0;
                float wave = sin(vPosition.y * 20.0 + uTime * 2.0) * 0.5 + 0.5;
                vec3 baseColor = mix(uColor, vec3(1.0, 0.4, 0.7), wave * 0.3);
                gl_FragColor = vec4(baseColor + glow, 0.85);
            }
        `;

        let scene, camera, renderer, bgMesh;
        let flowerGroup, centralFace, petals = [];
        let galaxyParticles, cosmicNodes = [];
        let raycaster, mouse;
        let currentMode = 'portal'; // portal or galaxy
        let targetRotationX = 0, targetRotationY = 0;
        let currentRotationX = 0, currentRotationY = 0;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        const poeticNames = ["KHEYA", "HLAMRA", "ANY LIA", "KUTLAI", "SORIN", "ELYSIA", "VRENA", "LYRA"];

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030208, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            createBackground();
            createCentralFlower();
            createGalaxyEnvironment();

            setupLighting();
            setupEventListeners();
            animateIntro();
        }

        function createBackground() {
            const bgGeo = new THREE.PlaneGeometry(2, 2);
            const bgMat = new THREE.ShaderMaterial({
                vertexShader: vertexShaderBackground,
                fragmentShader: fragmentShaderBackground,
                uniforms: {
                    uTime: { value: 0 },
                    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
                },
                depthWrite: false,
                transparent: true
            });
            bgMesh = new THREE.Mesh(bgGeo, bgMat);
            bgMesh.position.z = -10;
            scene.add(bgMesh);
        }

        function createCentralFlower() {
            flowerGroup = new THREE.Group();
            scene.add(flowerGroup);

            const faceGeo = new THREE.CylinderGeometry(0.4, 0.6, 1.5, 32, 32, true);
            const faceMat = new THREE.ShaderMaterial({
                vertexShader: vertexShaderFace,
                fragmentShader: fragmentShaderFace,
                uniforms: {
                    uTime: { value: 0 },
                    uColor: { value: new THREE.Color(0x2a1b4e) }
                },
                side: THREE.DoubleSide,
                transparent: true
            });
            centralFace = new THREE.Mesh(faceGeo, faceMat);
            centralFace.rotation.x = Math.PI / 4;
            flowerGroup.add(centralFace);

            const petalCount = 24;
            const petalMat = new THREE.MeshStandardMaterial({
                color: 0xff3377,
                roughness: 0.2,
                metalness: 0.1,
                side: THREE.DoubleSide,
                emissive: 0x3a001a,
                transparent: true,
                opacity: 0.9
            });

            for (let i = 0; i < petalCount; i++) {
                const petalG = new THREE.ConeGeometry(0.3, 2.2, 4);
                petalG.translate(0, 1.1, 0);
                const petal = new THREE.Mesh(petalG, petalMat);
                
                const phi = Math.acos(-1 + (2 * i) / petalCount);
                const theta = Math.sqrt(petalCount * Math.PI) * phi;
                
                petal.position.setFromSphericalCoords(0.6, phi, theta);
                petal.lookAt(flowerGroup.position);
                petal.rotation.z += Math.PI / 2;
                
                petal.userData = {
                    baseRotation: petal.rotation.clone(),
                    speed: 1 + Math.random() * 2,
                    phase: Math.random() * Math.PI * 2
                };
                
                flowerGroup.add(petal);
                petals.push(petal);
            }

            const pCount = 300;
            const pGeo = new THREE.BufferGeometry();
            const pPos = new Float32Array(pCount * 3);
            const pVel = [];

            for(let i=0; i<pCount*3; i+=3) {
                pPos[i] = (Math.random() - 0.5) * 0.5;
                pPos[i+1] = (Math.random() - 0.5) * 0.5;
                pPos[i+2] = (Math.random() - 0.5) * 0.5;
                pVel.push(new THREE.Vector3((Math.random()-0.5)*0.02, (Math.random()+0.2)*0.03, (Math.random()-0.5)*0.02));
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const pMat = new THREE.PointsMaterial({
                size: 0.04,
                color: 0x6366f1,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const coreParticles = new THREE.Points(pGeo, pMat);
            coreParticles.userData = { vels: pVel };
            flowerGroup.add(coreParticles);
        }

        function createGalaxyEnvironment() {
            const particleCount = 25000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            const colorPalette = [
                new THREE.Color(0x6366f1),
                new THREE.Color(0xa5b4fc),
                new THREE.Color(0xff3377),
                new THREE.Color(0x2a1b4e)
            ];

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const radius = Math.random() * 45;
                const spinAngle = radius * 0.22;
                const branchAngle = ((i % 4) * Math.PI * 2) / 4;

                const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 0.4 * radius;
                const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 0.4 * radius;
                const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 0.4 * radius;

                positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = randomY;
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

                const mixedColor = colorPalette[i % colorPalette.length].clone();
                colors[i3] = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.06,
                sizeAttenuation: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                transparent: true,
                opacity: 0
            });

            galaxyParticles = new THREE.Points(geometry, material);
            galaxyParticles.position.y = -50; 
            scene.add(galaxyParticles);

            poeticNames.forEach((name, idx) => {
                const nodeGroup = new THREE.Group();
                
                const nodeGeo = new THREE.IcosahedronGeometry(0.3, 1);
                const nodeMat = new THREE.MeshStandardMaterial({
                    color: 0xa5b4fc,
                    emissive: 0x6366f1,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.8
                });
                const nodeMesh = new THREE.Mesh(nodeGeo, nodeMat);
                nodeGroup.add(nodeMesh);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 256;
                canvas.height = 64;
                ctx.fillStyle = 'rgba(0,0,0,0)';
                ctx.fillRect(0,0,256,64);
                ctx.font = '24px monospace';
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#6366f1';
                ctx.shadowBlur = 10;
                ctx.fillText(name, 128, 40);

                const textTex = new THREE.CanvasTexture(canvas);
                const textMat = new THREE.SpriteMaterial({ map: textTex, transparent: true, blending: THREE.AdditiveBlending });
                const textSprite = new THREE.Sprite(textMat);
                textSprite.position.y = 0.7;
                textSprite.scale.set(2, 0.5, 1);
                nodeGroup.add(textSprite);

                const angle = (idx / poeticNames.length) * Math.PI * 2;
                const r = 12 + Math.random() * 8;
                nodeGroup.position.set(Math.cos(angle) * r, (Math.random() - 0.5) * 8 - 50, Math.sin(angle) * r);
                
                scene.add(nodeGroup);
                cosmicNodes.push(nodeGroup);
            });
        }

        function setupLighting() {
            const ambientLight = new THREE.AmbientLight(0x0a0518, 1.5);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0xff3377, 3, 15);
            pointLight1.position.set(2, 3, 2);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x6366f1, 4, 15);
            pointLight2.position.set(-2, -2, 3);
            scene.add(pointLight2);
        }

        function animateIntro() {
            const tl = gsap.timeline({ defaults: { ease: "power4.out", duration: 2 } });
            tl.to("#mainTitle", { opacity: 1, y: 0, delay: 0.5 })
              .to("#mainSub", { opacity: 1, y: 0 }, "-=1.5")
              .to("#mainHint", { opacity: 1 }, "-=1.0");

            gsap.from(flowerGroup.scale, { x: 0, y: 0, z: 0, duration: 2.5, ease: "elastic.out(1, 0.5)" });
        }

        function setupEventListeners() {
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onClick);

            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', handleUniverseRotation);

            document.getElementById('backBtn').addEventListener('click', transitionToPortal);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            bgMesh.material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (currentMode === 'portal') {
                gsap.to(flowerGroup.rotation, {
                    y: mouse.x * 0.3,
                    x: -mouse.y * 0.3,
                    duration: 0.8,
                    ease: "power2.out"
                });
            }
        }

        function handleUniverseRotation(e) {
            if (!isDragging || currentMode !== 'galaxy') return;

            const deltaMove = {
                x: e.clientX - previousMousePosition.x,
                y: e.clientY - previousMousePosition.y
            };

            targetRotationY += deltaMove.x * 0.005;
            targetRotationX += deltaMove.y * 0.005;

            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        window.addEventListener('mousemove', (e) => {
            if(!isDragging) {
                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        });

        function onClick() {
            if (currentMode !== 'portal') return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(flowerGroup.children, true);

            if (intersects.length > 0) {
                transitionToGalaxy();
            }
        }

        function transitionToGalaxy() {
            currentMode = 'transition';
            document.body.classList.add('cinematic-mode');

            gsap.timeline()
                .to(["#mainTitle", "#mainSub", "#mainHint"], { opacity: 0, y: -30, duration: 0.8, stagger: 0.1 })
                .to(camera.position, {
                    z: 0.8,
                    y: 0,
                    x: 0,
                    duration: 1.5,
                    ease: "power4.inOut"
                }, "-=0.5")
                .to(flowerGroup.scale, {
                    x: 0, y: 0, z: 0,
                    duration: 1.2,
                    ease: "power4.in"
                }, "-=1.5")
                .to(flowerGroup.position, {
                    y: 5,
                    duration: 1.2
                }, "-=1.5")
                .call(() => {
                    galaxyParticles.position.y = 0;
                    cosmicNodes.forEach(node => node.position.y += 50);
                    camera.position.set(0, 0, 18);
                })
                .to(galaxyParticles.material, { opacity: 1, duration: 2 })
                .to("#backBtn", { opacity: 1, pointerEvents: "auto", duration: 0.5 })
                .call(() => {
                    currentMode = 'galaxy';
                });
        }

        function transitionToPortal() {
            currentMode = 'transition';
            document.body.classList.remove('cinematic-mode');

            gsap.timeline()
                .to("#backBtn", { opacity: 0, pointerEvents: "none", duration: 0.5 })
                .to(galaxyParticles.material, { opacity: 0, duration: 1 })
                .call(() => {
                    galaxyParticles.position.y = -50;
                    cosmicNodes.forEach(node => node.position.y -= 50);
                    flowerGroup.position.set(0, 0, 0);
                    camera.position.set(0, 0, 5);
                    targetRotationX = 0;
                    targetRotationY = 0;
                    currentRotationX = 0;
                    currentRotationY = 0;
                })
                .to(flowerGroup.scale, { x: 1, y: 1, z: 1, duration: 1.5, ease: "power4.out" })
                .to(["#mainTitle", "#mainSub", "#mainHint"], { opacity: 1, y: 0, duration: 1, stagger: 0.1 })
                .call(() => {
                    currentMode = 'portal';
                });
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now() * 0.001;
            bgMesh.material.uniforms.uTime.value = time;

            if (currentMode === 'portal' || currentMode === 'transition') {
                centralFace.material.uniforms.uTime.value = time;
                
                petals.forEach(petal => {
                    const ud = petal.userData;
                    petal.rotation.x = ud.baseRotation.x + Math.sin(time * ud.speed + ud.phase) * 0.08;
                    petal.rotation.y = ud.baseRotation.y + Math.cos(time * ud.speed + ud.phase) * 0.08;
                });

                const coreParts = flowerGroup.children.find(c => c instanceof THREE.Points);
                if(coreParts) {
                    const pos = coreParts.geometry.attributes.position.array;
                    const vels = coreParts.userData.vels;
                    let vIdx = 0;
                    for(let i=0; i<pos.length; i+=3) {
                        pos[i] += vels[vIdx].x;
                        pos[i+1] += vels[vIdx].y;
                        pos[i+2] += vels[vIdx].z;

                        if(Math.length(pos[i], pos[i+1], pos[i+2]) > 1.5) {
                            pos[i] = 0; pos[i+1] = 0; pos[i+2] = 0;
                        }
                        vIdx++;
                    }
                    coreParts.geometry.attributes.position.needsUpdate = true;
                }
            }

            if (currentMode === 'galaxy') {
                currentRotationX += (targetRotationX - currentRotationX) * 0.05;
                currentRotationY += (targetRotationY - currentRotationY) * 0.05;

                galaxyParticles.rotation.x = currentRotationX;
                galaxyParticles.rotation.y = currentRotationY + time * 0.02;

                cosmicNodes.forEach((node, idx) => {
                    node.rotation.y += 0.01;
                    node.rotation.x += 0.005;
                    
                    const oscillation = Math.sin(time + idx) * 0.05;
                    node.position.y += oscillation * 0.1;

                    if(node.children[1]) {
                        node.children[1].lookAt(camera.position);
                    }
                });

                camera.position.x += (mouse.x * 2 - camera.position.x) * 0.02;
                camera.position.y += (-mouse.y * 2 - camera.position.y) * 0.02;
                camera.lookAt(0, 0, 0);
            }

            renderer.render(scene, camera);
        }

        Math.length = function(x, y, z) {
            return Math.sqrt(x*x + y*y + z*z);
        };
    </script>
</body>
</html>
